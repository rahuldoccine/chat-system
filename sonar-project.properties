sonar.projectKey=chat-system
sonar.projectName=Chat System
sonar.projectVersion=1.0

sonar.sources=backend/src,frontend/src,shared
sonar.tests=backend/src,frontend/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

sonar.exclusions=**/dist/**,**/node_modules/**,**/prisma/migrations/**,backend/scripts/**,frontend/public/**

# Coverage excluded from quality gate (per project policy)
sonar.coverage.exclusions=**/*

sonar.javascript.lcov.reportPaths=
sonar.typescript.lcov.reportPaths=

sonar.sourceEncoding=UTF-8
